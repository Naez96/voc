<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Vocal - 3 Canaux</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Icônes Unicode pour remplacer Font Awesome */
        .icon-microphone::before { content: '🎤'; }
        .icon-microphone-slash::before { content: '🔇'; }
        .icon-volume-up::before { content: '🔊'; }
        .icon-volume-down::before { content: '🔉'; }
        .icon-volume-mute::before { content: '🔇'; }
        .icon-user::before { content: '👤'; }
        .icon-users::before { content: '👥'; }
        .icon-headphones::before { content: '🎧'; }
        .icon-lock::before { content: '🔒'; }
        .icon-sign-in::before { content: '➡️'; }
        .icon-sign-out::before { content: '⬅️'; }
        .icon-info::before { content: 'ℹ️'; }
        .icon-check::before { content: '✅'; }
        .icon-warning::before { content: '⚠️'; }
        .icon-error::before { content: '❌'; }
        .icon-play::before { content: '▶️'; }
        .fas, .far { font-family: inherit; }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- En-tête -->
        <header class="header">
            <h1><span class="icon-microphone"></span> Chat Vocal</h1>
            <div class="header-info">
                <span id="connection-status" class="status offline">
                    <span class="icon-info"></span> Déconnecté
                </span>
            </div>
        </header>

        <!-- Connexion -->
        <div id="login-section" class="login-section">
            <div class="login-card">
                <h2><span class="icon-user"></span> Rejoindre le chat</h2>
                <form id="login-form">
                    <div class="input-group">
                        <label for="username">Nom d'utilisateur :</label>
                        <input type="text" id="username" required maxlength="20" placeholder="Entrez votre pseudo" autocomplete="username">
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <span class="icon-sign-in"></span> Se connecter
                    </button>
                </form>
            </div>
        </div>

        <!-- Application principale -->
        <div id="app-section" class="app-section hidden">
            <!-- Panel de gauche - Canaux -->
            <aside class="sidebar">
                <div class="user-info">
                    <div class="user-avatar">
                        <span class="icon-user"></span>
                    </div>
                    <div class="user-details">
                        <span id="current-username">Utilisateur</span>
                        <button id="disconnect-btn" class="btn btn-small btn-secondary">
                            <span class="icon-sign-out"></span> Déconnexion
                        </button>
                    </div>
                </div>

                <div class="channels-section">
                    <h3><span class="icon-headphones"></span> Canaux Vocaux</h3>
                    <div class="channels-list">
                        <div class="channel-item" data-channel="canal-general">
                            <div class="channel-info">
                                <span class="icon-volume-up"></span>
                                <span>Canal Général</span>
                            </div>
                            <span class="user-count">0</span>
                        </div>
                        <div class="channel-item" data-channel="canal-prive">
                            <div class="channel-info">
                                <span class="icon-lock"></span>
                                <span>Canal Privé</span>
                            </div>
                            <span class="user-count">0</span>
                        </div>
                        <div class="channel-item" data-channel="canal-conference">
                            <div class="channel-info">
                                <span class="icon-users"></span>
                                <span>Canal Conférence</span>
                            </div>
                            <span class="user-count">0</span>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- Zone principale -->
            <main class="main-content">
                <!-- Contrôles audio -->
                <div class="audio-controls">
                    <button id="mute-btn" class="btn btn-audio" title="Couper le micro">
                        <span class="icon-microphone"></span>
                    </button>
                    <div class="volume-control">
                        <span class="icon-volume-down"></span>
                        <input type="range" id="volume-slider" min="0" max="100" value="50">
                        <span class="icon-volume-up"></span>
                    </div>
                    <button id="speaker-btn" class="btn btn-audio" title="Couper les haut-parleurs">
                        <span class="icon-volume-up"></span>
                    </button>
                    <button id="enable-audio-btn" class="btn btn-audio" title="Activer l'audio" style="display: none;">
                        <span class="icon-play"></span>
                    </button>
                </div>

                <!-- Informations du canal actuel -->
                <div id="channel-info" class="channel-info-panel hidden">
                    <h2 id="current-channel-name">Aucun canal sélectionné</h2>
                    <p id="current-channel-description">Sélectionnez un canal pour commencer à parler</p>
                </div>

                <!-- Liste des utilisateurs dans le canal -->
                <div id="users-list" class="users-list hidden">
                    <h3><span class="icon-users"></span> Utilisateurs connectés</h3>
                    <div id="users-container" class="users-container">
                        <!-- Les utilisateurs seront ajoutés dynamiquement -->
                    </div>
                </div>

                <!-- Messages d'information -->
                <div id="messages" class="messages">
                    <div class="message info">
                        <span class="icon-info"></span>
                        Sélectionnez un canal pour rejoindre la conversation
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="js/webrtc.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
